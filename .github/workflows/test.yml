name: CI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # ── Build the PyO3 wheel once, share across all Python jobs ──────────
  build:
    name: Build Wheel (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Clone talkbank-tools
        run: git clone --depth 1 https://x-access-token:${{ secrets.TALKBANK_TOOLS_TOKEN }}@github.com/TalkBank/talkbank-tools ../talkbank-tools
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "pyo3 -> target"
          key: build-${{ matrix.python-version }}
      - name: Build wheel
        run: uv build --wheel --out-dir dist/
      - uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.python-version }}
          path: dist/*.whl
          retention-days: 1

  # ── Python tests — NO Rust compilation needed ────────────────────────
  test:
    name: Test (${{ matrix.python-version }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - uses: actions/download-artifact@v6
        with:
          name: wheel-${{ matrix.python-version }}
          path: dist/
      - name: Install from pre-built wheel
        run: |
          uv sync --extra dev --no-install-project
          uv pip install --no-deps dist/*.whl
          rm -rf batchalign_core/  # remove source dir so Python uses wheel-installed package
      - name: Run tests
        run: uv run --no-sync pytest batchalign --disable-pytest-warnings -k 'not test_whisper_fa_pipeline'

  # ── Type check + CI hygiene ──────────────────────────────────────────
  typecheck:
    name: Type Check & CI Hygiene
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Clone talkbank-tools
        run: git clone --depth 1 https://x-access-token:${{ secrets.TALKBANK_TOOLS_TOKEN }}@github.com/TalkBank/talkbank-tools ../talkbank-tools
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: actions/download-artifact@v6
        with:
          name: wheel-3.12
          path: dist/
      - name: Install from pre-built wheel
        run: |
          uv sync --extra dev --no-install-project
          uv pip install --no-deps dist/*.whl
          rm -rf batchalign_core/
      - name: Verify retirement gates
        run: |
          test ! -e batchalign/cli/cli.py
          test ! -e batchalign/serve/app.py
          test ! -e batchalign/serve/job_store.py
      - name: Test retired import paths
        run: uv run --no-sync pytest batchalign/tests/test_retired_runtime_paths.py -q
      - name: CI hygiene (Rust)
        run: cargo nextest run -p batchalign-cli --test ci_checks
      - name: Verify runtime constants
        run: uv run --no-sync python scripts/check_runtime_drift.py
      - name: Strict mypy
        run: uv run --no-sync mypy

  # ── Generated artifacts freshness ────────────────────────────────────
  generated-artifacts:
    name: Generated Artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Clone talkbank-tools
        run: git clone --depth 1 https://x-access-token:${{ secrets.TALKBANK_TOOLS_TOKEN }}@github.com/TalkBank/talkbank-tools ../talkbank-tools
      - uses: Swatinem/rust-cache@v2
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Verify dashboard API artifacts
        run: scripts/check_dashboard_api_drift.sh

  # ── Dashboard web build ──────────────────────────────────────────────
  dashboard-web-build:
    name: Dashboard Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Clone talkbank-tools
        run: git clone --depth 1 https://x-access-token:${{ secrets.TALKBANK_TOOLS_TOKEN }}@github.com/TalkBank/talkbank-tools ../talkbank-tools
      - uses: Swatinem/rust-cache@v2
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Verify API drift
        run: scripts/check_dashboard_api_drift.sh
      - name: Build dashboard
        working-directory: frontend
        run: npm run build

  # ── Dependency audit (no build needed) ───────────────────────────────
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Python audit
        run: |
          uv export --no-hashes --no-dev --no-emit-project > requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt
      - uses: dtolnay/rust-toolchain@stable
      - name: Clone talkbank-tools
        run: git clone --depth 1 https://x-access-token:${{ secrets.TALKBANK_TOOLS_TOKEN }}@github.com/TalkBank/talkbank-tools ../talkbank-tools
      - uses: Swatinem/rust-cache@v2
      - name: RustSec audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: taiki-e/install-action@cargo-deny
      - name: cargo-deny
        run: cargo deny check

  # ── Rust integration (plugin E2E) ────────────────────────────────────
  rust-integration:
    name: Rust Integration
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Clone talkbank-tools
        run: git clone --depth 1 https://x-access-token:${{ secrets.TALKBANK_TOOLS_TOKEN }}@github.com/TalkBank/talkbank-tools ../talkbank-tools
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - uses: actions/download-artifact@v6
        with:
          name: wheel-3.12
          path: dist/
      - name: Install batchalign + plugin
        run: |
          uv sync --extra dev --no-install-project
          uv pip install --no-deps dist/*.whl
          rm -rf batchalign_core/
          uv pip install -e tests/plugins/cantotag_plugin
      - name: Rust workspace check
        run: cargo check --workspace
      - name: Plugin E2E test
        run: cargo nextest run -p batchalign-app --test integration -E 'test(plugin_command_is_accepted_and_processed_when_available)'

  # ── Code coverage (manual trigger only — instrumented rebuild is ~25 min) ──
  coverage:
    name: Coverage
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android /usr/share/swift
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - name: Clone talkbank-tools
        run: git clone --depth 1 https://x-access-token:${{ secrets.TALKBANK_TOOLS_TOKEN }}@github.com/TalkBank/talkbank-tools ../talkbank-tools
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - uses: actions/download-artifact@v6
        with:
          name: wheel-3.12
          path: dist/
      - name: Install from pre-built wheel
        run: |
          uv sync --extra dev --no-install-project
          uv pip install --no-deps dist/*.whl
          rm -rf batchalign_core/
      - name: Python coverage
        run: uv run --no-sync pytest --cov=batchalign --cov-report=lcov:lcov-python.info batchalign --disable-pytest-warnings -k 'not test_whisper_fa_pipeline'
      - name: Rust PyO3 coverage
        run: cargo llvm-cov nextest --manifest-path pyo3/Cargo.toml --lcov --output-path lcov-rust.info
      - name: Rust workspace coverage
        run: cargo llvm-cov nextest --workspace --lcov --output-path lcov-rust-workspace.info
      # TODO: enable Codecov uploads once CODECOV_TOKEN is configured

  # ── Dashboard smoke (React + Playwright) ─────────────────────────────
  dashboard-smoke:
    name: Dashboard Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            frontend/e2e/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - name: Clone talkbank-tools
        run: git clone --depth 1 https://x-access-token:${{ secrets.TALKBANK_TOOLS_TOKEN }}@github.com/TalkBank/talkbank-tools ../talkbank-tools
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: dashboard-release
      - name: Run smoke suite
        env:
          BATCHALIGN_PLAYWRIGHT_WITH_DEPS: "1"
          RUSTFLAGS: -C debuginfo=0
        run: scripts/run_react_dashboard_smoke.sh

  # ── Dashboard E2E (real Rust server + Python worker) ─────────────────
  dashboard-e2e:
    name: Dashboard E2E
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          sudo rm -rf /usr/local/lib/android /usr/share/swift
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - name: Clone talkbank-tools
        run: git clone --depth 1 https://x-access-token:${{ secrets.TALKBANK_TOOLS_TOKEN }}@github.com/TalkBank/talkbank-tools ../talkbank-tools
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: dashboard-release
      - uses: actions/download-artifact@v6
        with:
          name: wheel-3.12
          path: dist/
      - name: Install from pre-built wheel
        run: |
          uv sync --extra dev --no-install-project
          uv pip install --no-deps dist/*.whl
          rm -rf batchalign_core/
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            frontend/e2e/package-lock.json
      - name: Run E2E suite
        env:
          BATCHALIGN_PLAYWRIGHT_WITH_DEPS: "1"
          BATCHALIGN_REAL_SERVER_E2E: "1"
          RUSTFLAGS: -C debuginfo=0
        run: |
          export BATCHALIGN_PYTHON="$(uv run --no-sync python -c 'import sys; print(sys.executable)')"
          scripts/run_react_dashboard_smoke.sh
