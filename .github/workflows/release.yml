name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to publish (e.g. v1.0.0)"
        required: true
      publish_pypi:
        description: "Publish to PyPI"
        type: boolean
        default: true
      publish_github:
        description: "Create GitHub Release with wheels"
        type: boolean
        default: true
  # Uncomment when ready for automated releases:
  # push:
  #   tags:
  #     - "v*"

permissions:
  contents: write    # GitHub Release creation
  id-token: write    # PyPI trusted publishing

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2_28"
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2_28"
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Clone sibling dependencies
        run: git clone --depth 1 https://x-access-token:${{ secrets.TALKBANK_TOOLS_TOKEN }}@github.com/TalkBank/talkbank-tools ../talkbank-tools
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux || 'auto' }}
          args: --release --out dist
      - uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.target }}
          path: dist/

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Clone sibling dependencies
        run: git clone --depth 1 https://x-access-token:${{ secrets.TALKBANK_TOOLS_TOKEN }}@github.com/TalkBank/talkbank-tools ../talkbank-tools
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/

  github-release:
    if: inputs.publish_github
    needs: [build, sdist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: "{wheel-*,sdist}"
          merge-multiple: true
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create "${{ inputs.tag }}" \
            --title "Batchalign3 ${{ inputs.tag }}" \
            --generate-notes \
            dist/*

  publish-pypi:
    if: inputs.publish_pypi
    needs: [build, sdist]
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: "{wheel-*,sdist}"
          merge-multiple: true
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
