name: Dashboard Desktop Bundles

on:
  workflow_dispatch: {}
  # Uncomment when Tauri desktop builds are ready:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'apps/dashboard-desktop/**'
  #     - 'frontend/**'
  #     - 'scripts/generate_dashboard_api_types.sh'
  #     - 'scripts/check_dashboard_api_drift.sh'
  #     - '.github/workflows/dashboard-desktop.yml'

jobs:
  bundle:
    name: Desktop Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE_BASE64 != '' }}
      HAS_WINDOWS_CERT: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            apps/dashboard-desktop/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Clone sibling dependencies
        run: git clone --depth 1 https://x-access-token:${{ secrets.TALKBANK_TOOLS_TOKEN }}@github.com/TalkBank/talkbank-tools ../talkbank-tools

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install desktop deps
        working-directory: apps/dashboard-desktop
        run: npm ci

      - name: Verify dashboard API drift gate
        run: scripts/check_dashboard_api_drift.sh

      - name: Prepare macOS signing certificate (optional)
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        run: |
          CERT_PATH="$RUNNER_TEMP/apple_signing.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"

          echo "${{ secrets.APPLE_CERTIFICATE_BASE64 }}" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" -T /usr/bin/codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain

      - name: Prepare Windows signing certificate (optional)
        if: runner.os == 'Windows' && env.HAS_WINDOWS_CERT == 'true'
        shell: pwsh
        run: |
          $CertPath = Join-Path $env:RUNNER_TEMP 'windows_signing.pfx'
          [IO.File]::WriteAllBytes($CertPath, [Convert]::FromBase64String('${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}'))
          "WINDOWS_CERTIFICATE=$CertPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build desktop bundles (unsigned by default, signed if secrets provided)
        working-directory: apps/dashboard-desktop
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: npm run build

      - name: Upload desktop bundle artifacts
        uses: actions/upload-artifact@v6
        with:
          name: dashboard-desktop-${{ matrix.os }}
          path: apps/dashboard-desktop/src-tauri/target/release/bundle/
          if-no-files-found: error
