[mypy]
python_version = 3.12
files = batchalign
exclude = batchalign/tests
ignore_missing_imports = true
mypy_path = stubs
strict = true
show_error_codes = true

# ML inference and model-training code interacts with PyTorch, HuggingFace
# Transformers, NeMo, etc. whose type stubs are incomplete or incorrect.
# Strict checking is not useful here — relax to avoid chasing upstream stubs.
[mypy-batchalign.inference.*]
ignore_errors = true

[mypy-batchalign.models.*]
ignore_errors = true

[mypy-batchalign.worker._main]
ignore_errors = true
